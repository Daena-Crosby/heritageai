<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-xl">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 text-orange-600 dark:text-orange-400 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors active:scale-95 duration-200 ease-in-out rounded-full">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-2xl font-black text-orange-600 dark:text-orange-500 italic font-['Epilogue'] tracking-tight">Heritage AI</h1>
</div>
<button class="p-2 text-orange-600 dark:text-orange-400 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors active:scale-95 duration-200 ease-in-out rounded-full">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</header>
<main class="pt-24 pb-40 px-6 max-w-xl mx-auto flex flex-col items-center min-h-screen">
<!-- Tab Selector -->
<div class="w-full flex p-1 bg-surface-container rounded-2xl mb-12 sunken-shadow">
<button class="flex-1 py-3 px-2 rounded-xl text-orange-700 dark:text-orange-300 bg-orange-100 dark:bg-orange-900/30 font-bold text-sm tracking-wide transition-all">
                Record Audio
            </button>
<button class="flex-1 py-3 px-2 rounded-xl text-stone-500 dark:text-stone-400 font-semibold text-sm tracking-wide hover:text-orange-500 dark:hover:text-orange-300 transition-colors">
                Type Story
            </button>
<button class="flex-1 py-3 px-2 rounded-xl text-stone-500 dark:text-stone-400 font-semibold text-sm tracking-wide hover:text-orange-500 dark:hover:text-orange-300 transition-colors">
                Upload Document
            </button>
</div>
<!-- Main Recording Interface -->
<div class="flex-1 flex flex-col items-center justify-center w-full">
<div class="relative group">
<!-- Outer Pulse Rings -->
<div class="absolute inset-0 bg-primary/20 rounded-full scale-150 blur-3xl opacity-30 group-hover:opacity-50 transition-opacity"></div>
<div class="absolute inset-0 bg-primary-container/10 rounded-full scale-110 animate-pulse"></div>
<!-- Primary Record Button -->
<button class="relative w-56 h-56 rounded-full bg-heritage-gradient shadow-2xl flex flex-col items-center justify-center gap-2 active:scale-90 transition-transform duration-300 overflow-hidden">
<span class="material-symbols-outlined text-6xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-headline font-bold text-on-primary-container text-lg">Tap to Record</span>
</button>
</div>
<div class="mt-12 text-center space-y-2">
<p class="text-on-surface-variant font-medium text-lg">Your voice is history.</p>
<p class="text-outline text-sm font-label uppercase tracking-[0.2em]">00:00 / 10:00</p>
</div>
</div>
<!-- Cultural Guide AI Prompt -->
<div class="w-full mt-16">
<div class="bg-surface-container-low p-6 rounded-[2rem] flex items-start gap-4 sunken-shadow relative overflow-hidden">
<!-- Subtle Gradient Accent -->
<div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
<div class="shrink-0 w-12 h-12 rounded-2xl bg-tertiary-container/30 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">temp_preferences_custom</span>
</div>
<div class="space-y-3">
<p class="text-sm font-label font-bold text-primary tracking-widest uppercase">Cultural Guide</p>
<p class="text-on-surface font-body leading-relaxed text-lg italic">
                        "Tell us about your favorite childhood meal... Who used to make it for you?"
                    </p>
<div class="flex gap-2">
<button class="px-4 py-2 bg-surface-container-highest rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-variant transition-colors">
                            Next Prompt
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-stone-50/90 dark:bg-stone-950/90 backdrop-blur-2xl rounded-t-[2rem] z-50 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 opacity-70 hover:opacity-100 hover:text-orange-500 dark:hover:text-orange-300 transition-all">
<span class="material-symbols-outlined mb-1">home_storage</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 opacity-70 hover:opacity-100 hover:text-orange-500 dark:hover:text-orange-300 transition-all">
<span class="material-symbols-outlined mb-1">auto_stories</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Vault</span>

<button class="flex flex-col items-center justify-center bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300 rounded-2xl px-5 py-2 scale-105 transition-all">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Record</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 opacity-70 hover:opacity-100 hover:text-orange-500 dark:hover:text-orange-300 transition-all">
<span class="material-symbols-outlined mb-1">temp_preferences_custom</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Guide</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 opacity-70 hover:opacity-100 hover:text-orange-500 dark:hover:text-orange-300 transition-all">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Settings</span>
</button>
