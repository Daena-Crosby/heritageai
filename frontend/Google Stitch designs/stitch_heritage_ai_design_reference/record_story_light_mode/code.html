      }

        background-color: #fff8f1;

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#fff8f1]/80 backdrop-blur-xl">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a83900]">menu</span>
<h1 class="text-xl font-bold italic text-[#ff6b2c] headline-font">Heritage AI</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#a83900]">search</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 pb-32 px-6 max-w-2xl mx-auto w-full flex flex-col items-center">
<!-- Tab Navigation -->
<nav class="w-full mt-8 flex p-1 bg-surface-container rounded-xl">
<button class="flex-1 py-3 text-sm font-bold rounded-lg bg-surface-container-lowest text-primary shadow-sm">Record Audio</button>
<button class="flex-1 py-3 text-sm font-medium text-on-secondary-container hover:bg-[#f4ede5] transition-colors rounded-lg">Type Story</button>
<button class="flex-1 py-3 text-sm font-medium text-on-secondary-container hover:bg-[#f4ede5] transition-colors rounded-lg">Upload Document</button>
</nav>
<!-- Recording Interface Section -->
<section class="flex flex-col items-center justify-center w-full mt-12 space-y-8">
<div class="text-center space-y-2">
<h2 class="headline-font text-3xl font-bold text-on-surface">Your voice is history.</h2>
<p class="text-on-surface-variant font-medium tracking-wide">00:00 / 10:00</p>
</div>
<!-- Central Recording Button -->
<div class="relative group">
<div class="absolute inset-0 bg-primary-container/20 rounded-full scale-125 blur-2xl"></div>
<button class="relative w-64 h-64 bg-primary-container rounded-full flex flex-col items-center justify-center text-white shadow-xl hover:scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-6xl mb-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-bold text-lg headline-font">Tap to Record</span>
</button>
</div>
<div class="flex gap-8 mt-4">
<div class="flex flex-col items-center opacity-40">
<div class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center mb-2">
<span class="material-symbols-outlined">restart_alt</span>
</div>
<span class="text-xs font-bold uppercase tracking-wider">Reset</span>
</div>
<div class="flex flex-col items-center opacity-40">
<div class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center mb-2">
<span class="material-symbols-outlined">check</span>
</div>
<span class="text-xs font-bold uppercase tracking-wider">Save</span>
</div>
</div>
</section>
<!-- Cultural Guide Section (Editorial Card) -->
<section class="w-full mt-16">
<div class="bg-surface-container-low rounded-2xl p-8 relative overflow-hidden">
<!-- Decorative element -->
<div class="absolute -right-4 -top-4 w-24 h-24 bg-primary-container/10 rounded-full blur-xl"></div>
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
<h3 class="headline-font font-bold text-xl text-on-surface">Cultural Guide</h3>
</div>
<p class="text-on-surface-variant text-lg leading-relaxed mb-8">
                    "Tell us about your favorite childhood meal... Who used to make it for you?"
                </p>
<div class="flex items-center justify-between">
<button class="flex items-center gap-2 text-primary font-bold headline-font hover:underline transition-all">
<span>Next Prompt</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<div class="h-1 w-24 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full"></div>
</div>
</div>
</div>
</section>
<!-- Background Image Decorative Asymmetry -->
<div class="w-full mt-12 grid grid-cols-2 gap-4">
<div class="h-48 rounded-xl overflow-hidden shadow-sm">
<img alt="vintage family photo" class="w-full h-full object-cover" data-alt="a nostalgic high-quality close up of an old sepia-toned family photograph held by elderly hands with warm natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5Nb6U8N0iy-FCiX0AmFZDyL_-BCh2c--TnvJazVrmDWPi-mWQvaJgRQCm3UIRizSS_8KB-EnaMcLiT10r-_tQVWxvamRu0aBf6mm0hxEGB5H4FD6_QluAGRXmqcSvApi_0mBzRF0EHhMpzriWzLvmzRCHkoqSicQmd98_ao9DsJ-2MEaxwBKZlXcPlJ0u18AQFyhG0Rye4MY9FfnIrUpGeB1zXsxy6lQifuwo6w2M_DTEfbeWZLcSVwr_Xhv2H1DIfaVEwDmNMEs"/>
</div>
<div class="h-48 mt-8 rounded-xl overflow-hidden shadow-sm">
<img alt="warm indoor setting" class="w-full h-full object-cover" data-alt="interior of a cozy sun-drenched library with dust motes dancing in the golden afternoon light hitting wooden bookshelves" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqmP1j1x1GWbZk5GWmAcSZriIFZKieeDK7rLANOtWJ3kGbXjTnAwKYHo3jwgFBQaVZo0ZzllV4cuxD8iTcG1MPjbj1WayvUU9I11pwROU0SuybRgsiENin_-A5YtTzIXE-U_mTs11wfUr4njN8t5zILeyDI-jKWj58Vk0uIT9n7FNmcQKYgBJP_Oz_Y1YBzggtAOsqxL9TmC8hAyUQdxYn0WoNwkUHYuz3xcjT-5GIkbp1MvyQCKs2vFCd9oQvZPejz9ObxIWgJv0"/>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#fff8f1]/80 backdrop-blur-xl shadow-[0_-4px_20px_0_rgba(30,27,23,0.05)] rounded-t-2xl">
<a class="flex flex-col items-center justify-center text-[#6d6151] p-2 hover:bg-[#f4ede5] rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">home_storage</span>
<span class="font-medium text-[11px] font-body mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6d6151] p-2 hover:bg-[#f4ede5] rounded-xl transition-colors" href="#">

<span class="font-medium text-[11px] font-body mt-1">Vault</span>

<a class="flex flex-col items-center justify-center bg-[#ff6b2c] text-white rounded-xl p-2 px-4 scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-medium text-[11px] font-body mt-1">Record</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6d6151] p-2 hover:bg-[#f4ede5] rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">colors_spark</span>
<span class="font-medium text-[11px] font-body mt-1">Guide</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6d6151] p-2 hover:bg-[#f4ede5] rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
